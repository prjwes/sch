<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Management - School Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <h1>School Management System</h1>
            </div>
            <div class="header-actions">
                <div class="theme-toggle">
                    <button id="themeToggle" class="theme-btn">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <span id="userName">Admin User</span>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        Logout
                    </button>
                </div>
            </div>
        </header>

        <main class="dashboard-container">
            <div class="dashboard-header">
                <div class="breadcrumb">
                    <a href="dashboard.html">Dashboard</a>
                    <i class="fas fa-chevron-right"></i>
                    <span id="gradeTitle">Grade 7</span>
                </div>
                <h1 class="dashboard-title" id="gradeHeading">Grade 7 Students</h1>
            </div>

            <div class="table-container">
                <div class="table-header">
                    <h3 class="table-title">Student List</h3>
                    <div class="table-actions">
                        <button class="btn btn-primary" onclick="ModalSystem.open('addStudentModal')">
                            <i class="fas fa-user-plus"></i>
                            Add Student
                        </button>
                        <button class="btn btn-secondary" onclick="exportStudents()">
                            <i class="fas fa-download"></i>
                            Export
                        </button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table class="data-table" id="studentsTable">
                        <thead>
                            <tr>
                                <th>Adm No.</th>
                                <th>Name</th>
                                <th>Gender</th>
                                <th>Age</th>
                                <th>Exam</th>
                                <th>Payments</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentsTableBody">
                             Students will be loaded here 
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

     Add Student Modal 
    <div id="addStudentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Add New Student</h3>
                <button class="modal-close" onclick="ModalSystem.close('addStudentModal')">&times;</button>
            </div>
            <form id="addStudentForm" class="auth-form">
                <input type="hidden" id="studentGradeHidden" name="studentGrade">
                <div class="form-group">
                    <label for="studentName">Full Name</label>
                    <input type="text" id="studentName" name="studentName" required>
                </div>
                <div class="form-group">
                    <label for="studentGender">Gender</label>
                    <select id="studentGender" name="studentGender" required>
                        <option value="">Select Gender</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="studentAge">Age</label>
                    <input type="number" id="studentAge" name="studentAge" required min="10" max="20">
                </div>
                <div class="form-group">
                    <label for="studentPhoto">Passport Photo (Optional)</label>
                    <input type="file" id="studentPhoto" name="studentPhoto" accept="image/*">
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-user-plus"></i>
                    Add Student
                </button>
            </form>
        </div>
    </div>

     Edit Student Modal 
    <div id="editStudentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Edit Student</h3>
                <button class="modal-close" onclick="ModalSystem.close('editStudentModal')">&times;</button>
            </div>
            <form id="editStudentForm" class="auth-form">
                <input type="hidden" id="editStudentId" name="studentId">
                <div class="form-group">
                    <label for="editStudentName">Full Name</label>
                    <input type="text" id="editStudentName" name="studentName" required>
                </div>
                <div class="form-group">
                    <label for="editStudentGender">Gender</label>
                    <select id="editStudentGender" name="studentGender" required>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editStudentAge">Age</label>
                    <input type="number" id="editStudentAge" name="studentAge" required min="10" max="20">
                </div>
                <div class="form-group">
                    <label for="editStudentPhoto">Passport Photo</label>
                    <input type="file" id="editStudentPhoto" name="studentPhoto" accept="image/*">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i>
                        Update Student
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="ModalSystem.close('editStudentModal')">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        class GradeManager {
            constructor() {
                this.currentGrade = new URLSearchParams(window.location.search).get('grade') || '7';
                this.init();
            }

            async init() {
                await this.checkAuth();
                this.updatePageTitle();
                await this.loadStudents();
                this.bindEvents();
            }

            async checkAuth() {
                try {
                    const response = await ApiHelper.get('api/check-auth.php');
                    if (response.success) {
                        this.updateUserInfo(response.user);
                    } else {
                        window.location.href = 'login.html';
                    }
                } catch (error) {
                    window.location.href = 'login.html';
                }
            }

            updateUserInfo(user) {
                document.getElementById('userName').textContent = user.full_name;
                document.getElementById('userAvatar').textContent = user.full_name.charAt(0).toUpperCase();
                window.currentUser = user;
            }

            updatePageTitle() {
                document.getElementById('gradeTitle').textContent = `Grade ${this.currentGrade}`;
                document.getElementById('gradeHeading').textContent = `Grade ${this.currentGrade} Students`;
                document.getElementById('studentGradeHidden').value = this.currentGrade;
                document.title = `Grade ${this.currentGrade} - School Management System`;
            }

            async loadStudents() {
                try {
                    const response = await ApiHelper.get(`api/get-students.php?grade=${this.currentGrade}`);
                    if (response.success) {
                        this.renderStudents(response.students);
                    }
                } catch (error) {
                    AlertSystem.error('Failed to load students');
                }
            }

            renderStudents(students) {
                const tbody = document.getElementById('studentsTableBody');
                tbody.innerHTML = '';

                if (students.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" class="text-center">No students found in Grade ${this.currentGrade}</td>
                        </tr>
                    `;
                    return;
                }

                students.forEach(student => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><a href="student-profile.html?id=${student.id}" class="student-link">${student.admission_number}</a></td>
                        <td><a href="student-profile.html?id=${student.id}" class="student-link">${student.full_name}</a></td>
                        <td>${student.gender}</td>
                        <td>${student.age}</td>
                        <td>
                            <div class="dropdown">
                                <button class="btn btn-view dropdown-toggle">
                                    <i class="fas fa-clipboard-list"></i>
                                    Exam
                                </button>
                                <div class="dropdown-menu">
                                    <a href="add-exam.html?grade=${this.currentGrade}" class="dropdown-item">
                                        <i class="fas fa-plus"></i> Add Exam
                                    </a>
                                    <a href="view-exams.html?grade=${this.currentGrade}" class="dropdown-item">
                                        <i class="fas fa-eye"></i> View Marks
                                    </a>
                                    <a href="edit-exams.html?grade=${this.currentGrade}" class="dropdown-item">
                                        <i class="fas fa-edit"></i> Edit Exam
                                    </a>
                                </div>
                            </div>
                        </td>
                        <td>
                            <button class="btn btn-view" onclick="viewPayments(${student.id})">
                                <i class="fas fa-money-bill-wave"></i>
                                Payments
                            </button>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <button class="action-btn btn-edit" onclick="editStudent(${student.id})" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="action-btn btn-view" onclick="promoteStudent(${student.id})" title="Promote">
                                    <i class="fas fa-arrow-up"></i>
                                </button>
                                <button class="action-btn btn-delete" onclick="deleteStudent(${student.id})" title="Delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            bindEvents() {
                document.getElementById('addStudentForm').addEventListener('submit', this.handleAddStudent.bind(this));
                document.getElementById('editStudentForm').addEventListener('submit', this.handleEditStudent.bind(this));
            }

            async handleAddStudent(event) {
                event.preventDefault();
                
                const form = event.target;
                const formData = new FormData(form);
                
                const submitBtn = form.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<span class="loading"></span> Adding Student...';
                submitBtn.disabled = true;
                
                try {
                    const response = await fetch('api/add-student.php', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        AlertSystem.success('Student added successfully!');
                        form.reset();
                        ModalSystem.close('addStudentModal');
                        this.loadStudents();
                    } else {
                        throw new Error(data.message);
                    }
                } catch (error) {
                    AlertSystem.error(error.message);
                } finally {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            }

            async handleEditStudent(event) {
                event.preventDefault();
                
                const form = event.target;
                const formData = new FormData(form);
                
                const submitBtn = form.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<span class="loading"></span> Updating...';
                submitBtn.disabled = true;
                
                try {
                    const response = await fetch('api/edit-student.php', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        AlertSystem.success('Student updated successfully!');
                        ModalSystem.close('editStudentModal');
                        this.loadStudents();
                    } else {
                        throw new Error(data.message);
                    }
                } catch (error) {
                    AlertSystem.error(error.message);
                } finally {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            }
        }

        // Global functions
        async function editStudent(studentId) {
            try {
                const response = await ApiHelper.get(`api/get-student.php?id=${studentId}`);
                if (response.success) {
                    const student = response.student;
                    document.getElementById('editStudentId').value = student.id;
                    document.getElementById('editStudentName').value = student.full_name;
                    document.getElementById('editStudentGender').value = student.gender;
                    document.getElementById('editStudentAge').value = student.age;
                    ModalSystem.open('editStudentModal');
                }
            } catch (error) {
                AlertSystem.error('Failed to load student data');
            }
        }

        async function deleteStudent(studentId) {
            if (confirm('Are you sure you want to delete this student? This action cannot be undone.')) {
                try {
                    const response = await ApiHelper.delete(`api/delete-student.php?id=${studentId}`);
                    if (response.success) {
                        AlertSystem.success('Student deleted successfully');
                        window.gradeManager.loadStudents();
                    } else {
                        throw new Error(response.message);
                    }
                } catch (error) {
                    AlertSystem.error(error.message);
                }
            }
        }

        async function promoteStudent(studentId) {
            if (confirm('Are you sure you want to promote this student to the next grade?')) {
                try {
                    const response = await ApiHelper.post('api/promote-student.php', { studentId });
                    if (response.success) {
                        AlertSystem.success(response.message);
                        window.gradeManager.loadStudents();
                    } else {
                        throw new Error(response.message);
                    }
                } catch (error) {
                    AlertSystem.error(error.message);
                }
            }
        }

        function viewPayments(studentId) {
            window.location.href = `student-payments.html?id=${studentId}`;
        }

        function exportStudents() {
            window.location.href = `api/export-students.php?grade=${window.gradeManager.currentGrade}`;
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                ApiHelper.post('api/logout.php')
                    .then(() => {
                        window.location.href = 'index.html';
                    })
                    .catch(() => {
                        window.location.href = 'index.html';
                    });
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            window.gradeManager = new GradeManager();
        });
    </script>
</body>
</html>
