<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - School Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <h1>School Management System</h1>
            </div>
            <div class="theme-toggle">
                <button id="themeToggle" class="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main class="auth-container">
            <div class="auth-card">
                <h2><i class="fas fa-user-graduate"></i> Student Portal</h2>
                
                <form id="studentLoginForm" class="auth-form">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" required 
                               placeholder="Enter your full name as registered">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-input">
                            <input type="password" id="password" name="password" required 
                                   placeholder="Default: student.{year}">
                            <button type="button" class="password-toggle" onclick="togglePassword('password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <small class="form-help">Default password format: student.{graduation_year}</small>
                    </div>

                    <button type="submit" class="btn btn-accent btn-full">
                        <i class="fas fa-sign-in-alt"></i>
                        Access Student Portal
                    </button>
                </form>

                <div class="auth-links">
                    <p>Staff member? <a href="login.html">Staff login here</a></p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('studentLoginForm').addEventListener('submit', handleStudentLogin);

        function handleStudentLogin(event) {
            event.preventDefault();
            
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading"></span> Logging in...';
            submitBtn.disabled = true;
            
            ApiHelper.post('api/student-login.php', data)
                .then(response => {
                    AlertSystem.success('Welcome to your student portal!');
                    setTimeout(() => {
                        window.location.href = 'student-dashboard.html';
                    }, 1000);
                })
                .catch(error => {
                    AlertSystem.error(error.message);
                })
                .finally(() => {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                });
        }
    </script>
</body>
</html>
