<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - School Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <h1>School Management System</h1>
            </div>
            <div class="theme-toggle">
                <button id="themeToggle" class="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main class="auth-container">
            <div class="auth-card">
                <h2><i class="fas fa-key"></i> Forgot Password</h2>
                
                <form id="forgotPasswordForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required 
                               placeholder="Enter your registered email">
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-paper-plane"></i>
                        Send Reset Code
                    </button>
                </form>

                <div class="auth-links">
                    <p>Remember your password? <a href="login.html">Login here</a></p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', handleForgotPassword);

        function handleForgotPassword(event) {
            event.preventDefault();
            
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading"></span> Sending...';
            submitBtn.disabled = true;
            
            ApiHelper.post('api/forgot-password.php', data)
                .then(response => {
                    AlertSystem.success('Reset code sent to your email!');
                    setTimeout(() => {
                        window.location.href = `reset-password.html?email=${encodeURIComponent(data.email)}`;
                    }, 2000);
                })
                .catch(error => {
                    AlertSystem.error(error.message);
                })
                .finally(() => {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                });
        }
    </script>
</body>
</html>
