<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - School Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <h1>School Management System</h1>
            </div>
            <div class="theme-toggle">
                <button id="themeToggle" class="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main class="auth-container">
            <div class="auth-card">
                <h2><i class="fas fa-lock"></i> Reset Password</h2>
                
                <form id="resetPasswordForm" class="auth-form">
                    <input type="hidden" id="email" name="email">
                    
                    <div class="form-group">
                        <label for="resetCode">4-Digit Reset Code</label>
                        <input type="text" id="resetCode" name="resetCode" required 
                               placeholder="Enter the code sent to your email" maxlength="4" pattern="[0-9]{4}">
                    </div>

                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <div class="password-input">
                            <input type="password" id="newPassword" name="newPassword" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmNewPassword">Confirm New Password</label>
                        <div class="password-input">
                            <input type="password" id="confirmNewPassword" name="confirmNewPassword" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmNewPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-save"></i>
                        Reset Password
                    </button>
                </form>

                <div class="auth-links">
                    <p><a href="forgot-password.html">Resend reset code</a></p>
                    <p><a href="login.html">Back to login</a></p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Get email from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (email) {
            document.getElementById('email').value = email;
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', handleResetPassword);

        function handleResetPassword(event) {
            event.preventDefault();
            
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            // Validate passwords match
            if (data.newPassword !== data.confirmNewPassword) {
                FormValidator.showError(form.confirmNewPassword, 'Passwords do not match');
                return;
            }
            
            // Validate password length
            if (!FormValidator.validatePassword(data.newPassword)) {
                FormValidator.showError(form.newPassword, 'Password must be at least 6 characters long');
                return;
            }
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading"></span> Resetting...';
            submitBtn.disabled = true;
            
            ApiHelper.post('api/reset-password.php', data)
                .then(response => {
                    AlertSystem.success('Password reset successfully!');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                })
                .catch(error => {
                    AlertSystem.error(error.message);
                })
                .finally(() => {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                });
        }
    </script>
</body>
</html>
